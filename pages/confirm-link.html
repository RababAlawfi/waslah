<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>تأكيد ربط الحسابات</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/confirm-link.css">

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

</head>

<body>

<div class="confirm-page">

    <h2>تأكيد ربط الحسابات</h2>

  <p class="desc">
سيتم ربط حساباتك البنكية بأمان عبر Open Banking.
</p>

    <!-- البنوك المختارة -->

    <div class="selected-banks">

        <h3>سيتم ربط الحسابات التالية</h3>

        <ul id="banksList"></ul>

    </div>

    <!-- الصلاحيات -->

    <div class="permissions">

        <div class="item">

            <span class="material-icons-outlined">account_balance_wallet</span>

            عرض الأرصدة

        </div>

        <div class="item">

            <span class="material-icons-outlined">receipt_long</span>

            تحليل العمليات

        </div>

        <div class="item">

            <span class="material-icons-outlined">insights</span>

            إنشاء التحليلات

        </div>

        <div class="item">

            <span class="material-icons-outlined">shield</span>

            حماية البيانات

        </div>

    </div>

    <div class="duration">

        <span class="material-icons-outlined">schedule</span>

        صلاحية الربط: 90 يومًا

    </div>

    <label class="agree">

        <input type="checkbox" id="agreeCheck">

        أوافق على سياسة الخصوصية وشروط الاستخدام

    </label>

    <button id="confirmBtn" disabled>

        أوافق وأكمل

    </button>

</div>

<script src="../js/confirm-link.js"></script>

</body>

</html>
